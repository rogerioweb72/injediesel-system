name: Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.VITE_SUPABASE_URL }}" ]; then echo "ERRO: VITE_SUPABASE_URL vazio" && exit 1; fi
          if [ -z "${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}" ]; then echo "ERRO: VITE_SUPABASE_PUBLISHABLE_KEY vazio" && exit 1; fi
          echo "Secrets OK"

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
          VITE_R2_PRESIGN_URL: ${{ secrets.VITE_R2_PRESIGN_URL }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
        run: npm run build

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via FTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          # Write lftp script to file — Python handles credential escaping safely
          python3 - << 'PYEOF'
          import os, shlex
          host = os.environ['FTP_HOST']
          user = os.environ['FTP_USER']
          pwd  = os.environ['FTP_PASS']
          script = f"""set net:timeout 90
          set net:max-retries 4
          set net:reconnect-interval-base 10
          set net:reconnect-interval-multiplier 2
          set ftp:passive-mode yes
          set ftp:ssl-allow yes
          set ftp:ssl-force no
          set ftp:ssl-protect-data yes
          open -u {shlex.quote(user)},{shlex.quote(pwd)} {shlex.quote(host)}
          mirror --reverse --verbose --parallel=5 --exclude-glob .git* --exclude-glob node_modules ./dist/ /public_html/
          bye
          """
          with open('/tmp/deploy.lftp', 'w') as f:
              f.write(script)
          PYEOF

          MAX_RETRIES=5
          DELAY=15
          for i in $(seq 1 $MAX_RETRIES); do
            echo "=== Tentativa $i/$MAX_RETRIES ==="
            if lftp -f /tmp/deploy.lftp; then
              echo "Deploy concluído na tentativa $i."
              exit 0
            fi
            if [ "$i" -lt "$MAX_RETRIES" ]; then
              echo "Falhou. Aguardando ${DELAY}s..."
              sleep $DELAY
              DELAY=$((DELAY * 2))
            fi
          done

          echo "Todas as $MAX_RETRIES tentativas falharam."
          exit 1
