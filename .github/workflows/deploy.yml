name: Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Validate secrets
        run: |
          if [ -z "${{ secrets.VITE_SUPABASE_URL }}" ]; then echo "ERRO: VITE_SUPABASE_URL vazio" && exit 1; fi
          if [ -z "${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}" ]; then echo "ERRO: VITE_SUPABASE_PUBLISHABLE_KEY vazio" && exit 1; fi
          echo "Secrets OK"

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
          VITE_R2_PRESIGN_URL: ${{ secrets.VITE_R2_PRESIGN_URL }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
        run: npm run build

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via FTP (lftp with retry)
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          MAX_RETRIES=5
          DELAY=15

          for i in $(seq 1 $MAX_RETRIES); do
            echo "=== Tentativa $i/$MAX_RETRIES ==="
            if lftp -c "
              set net:timeout 120
              set net:max-retries 3
              set net:reconnect-interval-base 10
              set net:reconnect-interval-multiplier 2
              set ftp:passive-mode yes
              set ftp:ssl-allow yes
              set ftp:ssl-force no
              set ftp:ssl-protect-data yes
              open -u '$FTP_USER','$FTP_PASS' '$FTP_HOST'
              mirror --reverse --delete --verbose \
                --exclude '^\.git' \
                --exclude '^node_modules' \
                ./dist/ /public_html/
              bye
            "; then
              echo "Deploy concluído na tentativa $i."
              exit 0
            fi

            if [ "$i" -lt "$MAX_RETRIES" ]; then
              echo "Falhou. Aguardando ${DELAY}s..."
              sleep $DELAY
              DELAY=$((DELAY * 2))
            fi
          done

          echo "Todas as $MAX_RETRIES tentativas falharam."
          exit 1
